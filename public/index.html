<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Chat IA</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.debug.js"></script>
</head>
<body>

    <header>
        <h1>� Chat com Bob Esponja IA</h1>
        <select id="ai-model">
            <option value="gemini-3-flash-preview">Gemini 3.0 Flash</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro</option>
        </select>
    </header>

    <div id="chat-container">
        <div class="message bot">
            <p>Oi, eu sou o Bob Esponja! Estou aqui no fundo do mar com meus amigos Patrick, Lula Molusco e o Senhor Sirigueijo. Escolha um modelo de IA e vamos conversar! 🍍</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="pergunta" placeholder="Digite uma mensagem..." onkeypress="verificarEnter(event)">
        <button onclick="enviar()">Enviar</button>
    </div>

    <div class="loading" id="status">O bot está digitando...</div>

    <script>
      const chatContainer = document.getElementById('chat-container');
        const inputPergunta = document.getElementById('pergunta');
        const statusMsg = document.getElementById('status');

        function verificarEnter(event) {
            if (event.key === 'Enter') {
                enviar();
            }
        }

        // FUNÇÃO DE GERAR PDF (CORRIGIDA)
        function gerarPDF(texto) {
            try {
                // Com a versão 1.5.3, usamos o comando direto
                const doc = new jsPDF();
                
                doc.setFontSize(16);
                doc.text("Resposta do Agente IA", 10, 20);
                
                doc.setFontSize(12);
                // Divide o texto para caber na folha
                const linhas = doc.splitTextToSize(texto, 180);
                doc.text(linhas, 10, 30);
                
                doc.save(`resposta_${Date.now()}.pdf`);
            } catch (err) {
                console.error(err);
                alert("Erro ao gerar o PDF. Verifique o console.");
            }
        }

        function adicionarMensagem(texto, tipo) {
            const div = document.createElement('div');
            div.className = `message ${tipo}`;
            
            // Texto da mensagem
            const p = document.createElement('p');
            p.innerText = texto;
            div.appendChild(p);

            // Botão de PDF apenas para o bot
            if (tipo === 'bot') {
                const btn = document.createElement('button');
                btn.className = 'btn-pdf';
                btn.innerText = '📄 Baixar PDF';
                btn.onclick = () => gerarPDF(texto);
                div.appendChild(btn);
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function enviar() {
            const pergunta = inputPergunta.value.trim();
            if (!pergunta) return;

            // Captura o modelo selecionado
            const modeloSelecionado = document.getElementById('ai-model').value;

            adicionarMensagem(pergunta, 'user');
            inputPergunta.value = '';
            statusMsg.style.display = 'block';

            try {
                const response = await fetch('http://localhost:5000/perguntar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pergunta, modelo: modeloSelecionado })
                });

                const data = await response.json();
                statusMsg.style.display = 'none';

                if (data.resposta) {
                    adicionarMensagem(data.resposta, 'bot');
                } else {
                    adicionarMensagem("Erro ao obter resposta.", 'bot');
                }
            } catch (error) {
                statusMsg.style.display = 'none';
                adicionarMensagem("Erro: Servidor desconectado.", 'bot');
            }
        }
    </script>
</body>
</html>
